name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  schedule:
    # 毎朝 07:00 JST に最新データで自動リビルド
    # GAS側の Instagram データ日次更新（6:00 JST）後、blog_list_sync (6:00 JST) も完了済みのタイミング
    - cron: '0 22 * * *'  # 22:00 UTC = 07:00 JST 翌日
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=gohome-study-hub --branch=main
